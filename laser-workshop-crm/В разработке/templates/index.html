<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Лазерная Мастерская CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #eaeaea;
            --accent-color: #0f3460;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
            --border-color: #2a2a4a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        
        .logo { font-size: 24px; font-weight: bold; color: #4fc3f7; }
        
        .nav-buttons { display: flex; gap: 10px; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #4fc3f7; color: #1a1a2e; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        
        .card h3 { margin-bottom: 15px; color: #4fc3f7; }
        
        .metric { font-size: 32px; font-weight: bold; color: var(--success-color); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active { background: #4fc3f7; color: #1a1a2e; }
        
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .orders-table th, .orders-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .orders-table th { background: var(--accent-color); }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-new { background: #2196f3; color: white; }
        .status-processing { background: var(--warning-color); color: white; }
        .status-done { background: var(--success-color); color: white; }
        
        .chat-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: 600px;
        }
        
        .chat-clients {
            background: var(--card-bg);
            border-radius: 12px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        
        .chat-client {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .chat-client:hover, .chat-client.active { background: var(--accent-color); }
        
        .chat-window {
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 70%;
        }
        
        .message-client {
            background: var(--accent-color);
            margin-right: auto;
        }
        
        .message-admin {
            background: #4fc3f7;
            color: #1a1a2e;
            margin-left: auto;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            margin-right: 10px;
        }
        
        .calculator-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .form-group { margin-bottom: 15px; }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4fc3f7;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        
        .calculator-result {
            margin-top: 20px;
            padding: 20px;
            background: var(--accent-color);
            border-radius: 8px;
            text-align: center;
        }
        
        .calculator-result h2 { font-size: 36px; color: var(--success-color); }
        
        @media (max-width: 768px) {
            .chat-container { grid-template-columns: 1fr; }
            .chat-clients { max-height: 200px; }
            .dashboard { grid-template-columns: 1fr; }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--success-color);
            color: white;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🔬 Лазерная Мастерская</div>
            <div class="nav-buttons">
                <button class="btn btn-primary" onclick="exportCSV()">📥 Экспорт CSV</button>
                <button class="btn btn-success" onclick="downloadBackup()">💾 Бэкап</button>
                <a href="/logout" class="btn btn-danger">🚪 Выход</a>
            </div>
        </header>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('dashboard')">📊 Дашборд</div>
            <div class="tab" onclick="switchTab('orders')">📋 Заказы</div>
            <div class="tab" onclick="switchTab('chat')">💬 VK Чат</div>
            <div class="tab" onclick="switchTab('calculator')">🧮 Калькулятор</div>
            <div class="tab" onclick="switchTab('clients')">👥 Клиенты</div>
        </div>
        
        <!-- ДАШБОРД -->
        <div id="dashboard" class="content-section active">
            <div class="dashboard">
                <div class="card">
                    <h3>💰 Выручка сегодня</h3>
                    <div class="metric" id="today-revenue">0₽</div>
                </div>
                <div class="card">
                    <h3>📦 Активные заказы</h3>
                    <div class="metric" id="active-orders">0</div>
                </div>
                <div class="card">
                    <h3>✅ Выполнено</h3>
                    <div class="metric" id="completed-orders">0</div>
                </div>
            </div>
            <div class="card">
                <h3>📈 Выручка по дням</h3>
                <canvas id="revenueChart" height="100"></canvas>
            </div>
        </div>
        
        <!-- ЗАКАЗЫ -->
        <div id="orders" class="content-section">
            <div class="card">
                <h3>📋 Все заказы</h3>
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Клиент</th>
                            <th>Услуга</th>
                            <th>Цена</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body">
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- ЧАТ -->
        <div id="chat" class="content-section">
            <div class="chat-container">
                <div class="chat-clients" id="chat-clients">
                </div>
                <div class="chat-window">
                    <div class="chat-messages" id="chat-messages">
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chat-message-input" placeholder="Введите сообщение...">
                        <button class="btn btn-primary" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- КАЛЬКУЛЯТОР -->
        <div id="calculator" class="content-section">
            <div class="card">
                <h3>🧮 Умный калькулятор</h3>
                <div class="calculator-form">
                    <div class="form-group">
                        <label>Услуга</label>
                        <select id="calc-service" onchange="updateCalculatorFields()">
                        </select>
                    </div>
                </div>
                <div id="calc-fields" class="calculator-form" style="margin-top: 20px;">
                </div>
                <div class="calculator-result">
                    <h2 id="calc-total">0₽</h2>
                    <p id="calc-discount"></p>
                </div>
                <button class="btn btn-success" style="margin-top: 20px;" onclick="createOrderFromCalc()">
                    📝 Создать заказ
                </button>
            </div>
        </div>
        
        <!-- КЛИЕНТЫ -->
        <div id="clients" class="content-section">
            <div class="card">
                <h3>👥 База клиентов</h3>
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>VK ID</th>
                            <th>Заказов</th>
                            <th>Всего spent</th>
                        </tr>
                    </thead>
                    <tbody id="clients-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let priceList = [];
        let currentClientVkId = null;
        let revenueChart = null;
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            loadPriceList();
            loadOrders();
            loadClients();
            loadAnalytics();
            loadChatClients();
            
            // Auto-polling чата каждые 3 секунды
            setInterval(() => {
                if (currentClientVkId) {
                    loadChatMessages(currentClientVkId);
                }
            }, 3000);
        });
        
        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function loadPriceList() {
            const response = await fetch('/api/price_list');
            priceList = await response.json();
            
            const select = document.getElementById('calc-service');
            select.innerHTML = '<option value="">Выберите услугу</option>';
            priceList.forEach((item, index) => {
                select.innerHTML += `<option value="${index}" data-type="${item.calc_type}" data-price="${item.price}">${item.name} - ${item.price}₽</option>`;
            });
        }
        
        function updateCalculatorFields() {
            const select = document.getElementById('calc-service');
            const option = select.options[select.selectedIndex];
            if (!option.value) return;
            
            const calcType = option.getAttribute('data-type');
            const fieldsDiv = document.getElementById('calc-fields');
            
            const fieldConfigs = {
                'fixed': [{name: 'quantity', label: 'Количество (шт)', type: 'number'}],
                'area_cm2': [
                    {name: 'length', label: 'Длина (см)', type: 'number'},
                    {name: 'width', label: 'Ширина (см)', type: 'number'}
                ],
                'meter_thickness': [
                    {name: 'meters', label: 'Метры реза', type: 'number'},
                    {name: 'thickness', label: 'Толщина (мм)', type: 'number'}
                ],
                'per_minute': [{name: 'minutes', label: 'Минуты', type: 'number'}],
                'per_char': [{name: 'chars', label: 'Символы', type: 'number'}],
                'vector_length': [{name: 'length', label: 'Метры', type: 'number'}],
                'setup_batch': [
                    {name: 'setup_price', label: 'Настройка (₽)', type: 'number'},
                    {name: 'quantity', label: 'Тираж (шт)', type: 'number'}
                ],
                'photo_raster': [
                    {name: 'length', label: 'Длина (см)', type: 'number'},
                    {name: 'width', label: 'Ширина (см)', type: 'number'},
                    {name: 'dpi_multiplier', label: 'DPI множитель', type: 'number'}
                ],
                'cylindrical': [
                    {name: 'diameter', label: 'Диаметр (мм)', type: 'number'},
                    {name: 'length', label: 'Длина (мм)', type: 'number'}
                ],
                'volume_3d': [
                    {name: 'length', label: 'Длина (см)', type: 'number'},
                    {name: 'width', label: 'Ширина (см)', type: 'number'},
                    {name: 'depth', label: 'Глубина (мм)', type: 'number'}
                ],
                'material_and_cut': [
                    {name: 'length', label: 'Длина (см)', type: 'number'},
                    {name: 'width', label: 'Ширина (см)', type: 'number'},
                    {name: 'cut_meters', label: 'Метры реза', type: 'number'}
                ]
            };
            
            const config = fieldConfigs[calcType] || [];
            fieldsDiv.innerHTML = config.map(f => `
                <div class="form-group">
                    <label>${f.label}</label>
                    <input type="${f.type}" id="calc-${f.name}" value="${f.type === 'number' ? '0' : ''}" 
                           oninput="calculatePrice()">
                </div>
            `).join('');
            
            calculatePrice();
        }
        
        function calculatePrice() {
            const select = document.getElementById('calc-service');
            const option = select.options[select.selectedIndex];
            if (!option.value) return;
            
            const calcType = option.getAttribute('data-type');
            const basePrice = parseFloat(option.getAttribute('data-price'));
            
            const params = {};
            document.querySelectorAll('#calc-fields input').forEach(input => {
                const name = input.id.replace('calc-', '');
                params[name] = parseFloat(input.value) || 0;
            });
            
            let price = 0;
            
            if (calcType === 'fixed') {
                price = basePrice * (params.quantity || 1);
            } else if (calcType === 'area_cm2') {
                price = (params.length / 10) * (params.width / 10) * basePrice;
            } else if (calcType === 'meter_thickness') {
                price = params.meters * (basePrice * (params.thickness / 3.0));
            } else if (calcType === 'per_minute') {
                price = params.minutes * basePrice;
            } else if (calcType === 'per_char') {
                price = params.chars * basePrice;
            } else if (calcType === 'vector_length') {
                price = params.length * basePrice;
            } else if (calcType === 'setup_batch') {
                price = (params.setup_price || basePrice) + (basePrice * (params.quantity || 1));
            } else if (calcType === 'photo_raster') {
                price = (params.length / 10) * (params.width / 10) * basePrice * (params.dpi_multiplier || 1);
            } else if (calcType === 'cylindrical') {
                price = (params.diameter * 3.14 * params.length / 100) * basePrice;
            } else if (calcType === 'volume_3d') {
                price = (params.length / 10) * (params.width / 10) * params.depth * basePrice;
            } else if (calcType === 'material_and_cut') {
                price = ((params.length / 10) * (params.width / 10) * basePrice) + (params.cut_meters * basePrice);
            }
            
            // Скидка
            const quantity = params.quantity || 1;
            let discount = 0;
            if (quantity >= 100) discount = 20;
            else if (quantity >= 50) discount = 15;
            else if (quantity >= 20) discount = 10;
            else if (quantity >= 10) discount = 5;
            
            const finalPrice = price * (1 - discount / 100);
            
            document.getElementById('calc-total').textContent = finalPrice.toFixed(2) + '₽';
            document.getElementById('calc-discount').textContent = discount > 0 ? `Скидка ${discount}%` : '';
        }
        
        async function loadOrders() {
            const response = await fetch('/api/orders');
            const orders = await response.json();
            
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>#${order.id}</td>
                    <td>${order.client_name}</td>
                    <td>${order.service_name}</td>
                    <td>${order.total_price}₽</td>
                    <td><span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span></td>
                    <td>
                        <button class="btn btn-success" onclick="updateStatus(${order.id}, 'PROCESSING')">⚙️</button>
                        <button class="btn btn-primary" onclick="updateStatus(${order.id}, 'DONE')">✅</button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('active-orders').textContent = orders.filter(o => o.status === 'NEW' || o.status === 'PROCESSING').length;
            document.getElementById('completed-orders').textContent = orders.filter(o => o.status === 'DONE').length;
        }
        
        async function updateStatus(orderId, status) {
            await fetch('/api/order/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: orderId, status: status})
            });
            showToast(`Статус обновлен: ${status}`);
            loadOrders();
        }
        
        async function loadClients() {
            const response = await fetch('/api/clients');
            const clients = await response.json();
            
            const tbody = document.getElementById('clients-body');
            tbody.innerHTML = clients.map(client => `
                <tr>
                    <td>${client.id}</td>
                    <td>${client.name}</td>
                    <td>${client.vk_id || '-'}</td>
                    <td>${client.total_orders}</td>
                    <td>${client.total_spent}₽</td>
                </tr>
            `).join('');
        }
        
        async function loadChatClients() {
            const response = await fetch('/api/clients');
            const clients = await response.json();
            
            const div = document.getElementById('chat-clients');
            div.innerHTML = clients.filter(c => c.vk_id).map(client => `
                <div class="chat-client" onclick="selectClient(${client.vk_id}, '${client.name}')">
                    <strong>${client.name}</strong><br>
                    <small>VK: ${client.vk_id}</small>
                </div>
            `).join('');
        }
        
        function selectClient(vkId, name) {
            currentClientVkId = vkId;
            document.querySelectorAll('.chat-client').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            loadChatMessages(vkId);
        }
        
        async function loadChatMessages(vkId) {
            const response = await fetch(`/api/chat/history?vk_id=${vkId}`);
            const messages = await response.json();
            
            const div = document.getElementById('chat-messages');
            div.innerHTML = messages.reverse().map(msg => `
                <div class="message ${msg.is_admin ? 'message-admin' : 'message-client'}">
                    ${msg.message_text}<br>
                    <small>${msg.timestamp}</small>
                </div>
            `).join('');
            
            div.scrollTop = div.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('chat-message-input');
            const message = input.value.trim();
            
            if (!message || !currentClientVkId) return;
            
            await fetch('/api/chat/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({vk_id: currentClientVkId, message: message})
            });
            
            input.value = '';
            loadChatMessages(currentClientVkId);
        }
        
        async function loadAnalytics() {
            const response = await fetch('/api/analytics/revenue');
            const data = await response.json();
            
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            if (revenueChart) revenueChart.destroy();
            
            revenueChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date).reverse(),
                    datasets: [{
                        label: 'Выручка (₽)',
                        data: data.map(d => d.revenue).reverse(),
                        borderColor: '#4fc3f7',
                        backgroundColor: 'rgba(79, 195, 247, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#eaeaea' } }
                    },
                    scales: {
                        y: { ticks: { color: '#eaeaea' }, grid: { color: '#2a2a4a' } },
                        x: { ticks: { color: '#eaeaea' }, grid: { color: '#2a2a4a' } }
                    }
                }
            });
            
            const today = new Date().toISOString().split('T')[0];
            const todayRevenue = data.find(d => d.date === today)?.revenue || 0;
            document.getElementById('today-revenue').textContent = todayRevenue.toFixed(2) + '₽';
        }
        
        async function exportCSV() {
            window.open('/api/export/csv', '_blank');
            showToast('Экспорт начат');
        }
        
        async function downloadBackup() {
            window.open('/api/backup/download', '_blank');
            showToast('Бэкап скачивается');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function createOrderFromCalc() {
            const select = document.getElementById('calc-service');
            const option = select.options[select.selectedIndex];
            if (!option.value) {
                showToast('Выберите услугу');
                return;
            }
            
            const params = {};
            document.querySelectorAll('#calc-fields input').forEach(input => {
                params[input.id.replace('calc-', '')] = input.value;
            });
            
            const total = parseFloat(document.getElementById('calc-total').textContent);
            
            await fetch('/api/order/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    service_id: option.value,
                    service_name: option.text.split(' - ')[0],
                    parameters: params,
                    total_price: total,
                    status: 'NEW'
                })
            });
            
            showToast('Заказ создан');
            loadOrders();
        }
    </script>
</body>
</html>
