<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Workshop CRM - Дашборд</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <!-- Боковая навигация -->
    <nav class="sidebar">
        <div class="logo">
            <h1>⚡ Laser CRM</h1>
        </div>
        <ul class="nav-menu">
            <li><a href="/" class="active">📊 Дашборд</a></li>
            <li><a href="/orders">📋 Заказы</a></li>
            <li><a href="/clients">👤 Клиенты</a></li>
            <li><a href="/chat">💬 Чат VK</a></li>
            <li><a href="/analytics">📈 Аналитика</a></li>
            <li><a href="/settings">⚙️ Настройки</a></li>
        </ul>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <!-- Хедер -->
        <header class="header">
            <h2>Дашборд</h2>
            <div class="header-actions">
                <select id="theme-switcher" class="theme-select">
                    <option value="dark">🌙 Тёмная</option>
                    <option value="light">☀️ Светлая</option>
                </select>
            </div>
        </header>

        <!-- Карточки статистики -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <h3 id="total-orders">0</h3>
                    <p>Всего заказов</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-info">
                    <h3 id="processing-orders">0</h3>
                    <p>В работе</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <h3 id="done-orders">0</h3>
                    <p>Готовы</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <h3 id="revenue">0 ₽</h3>
                    <p>Выручка (мес)</p>
                </div>
            </div>
        </div>

        <!-- Графики -->
        <div class="charts-grid">
            <div class="chart-container">
                <h3>Выручка по дням</h3>
                <canvas id="revenue-chart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Топ услуг</h3>
                <canvas id="services-chart"></canvas>
            </div>
        </div>

        <!-- Последние заказы -->
        <div class="recent-orders">
            <h3>Последние заказы</h3>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Клиент</th>
                            <th>Услуга</th>
                            <th>Статус</th>
                            <th>Цена</th>
                            <th>Дата</th>
                        </tr>
                    </thead>
                    <tbody id="recent-orders-body">
                        <tr><td colspan="6">⏳ Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/theme.js"></script>
</body>
</html>
